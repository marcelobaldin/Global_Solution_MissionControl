<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MissionControl - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0b0d1a;
  color:#e2e8f0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.stars{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(2px 2px at 20px 30px,#fff,transparent),
  radial-gradient(2px 2px at 40px 70px,rgba(255,255,255,.8),transparent),
  radial-gradient(1px 1px at 90px 40px,#fff,transparent),
  radial-gradient(1px 1px at 130px 80px,rgba(255,255,255,.6),transparent),
  radial-gradient(2px 2px at 160px 30px,#fff,transparent);
  background-size:200px 100px;
  animation:twinkle 4s ease-in-out infinite alternate;
  z-index:0;
}
@keyframes twinkle{0%{opacity:.5}100%{opacity:1}}
.login-container{
  position:relative;z-index:1;
  background:rgba(19,22,49,.9);
  border:1px solid rgba(0,212,255,.2);
  border-radius:16px;
  padding:40px;
  width:380px;
  box-shadow:0 0 40px rgba(0,212,255,.1);
}
.logo{text-align:center;margin-bottom:30px}
.logo-icon{
  width:80px;height:80px;
  border-radius:50%;
  background:linear-gradient(135deg,#0066cc,#00d4ff);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  box-shadow:0 0 30px rgba(0,212,255,.3);
}
.logo-icon svg{width:40px;height:40px;fill:#fff}
.logo h1{font-size:22px;font-weight:700;color:#00d4ff;letter-spacing:1px}
.logo p{font-size:12px;color:#94a3b8;margin-top:4px;letter-spacing:2px}
.form-group{margin-bottom:20px}
.form-group label{
  display:block;font-size:12px;font-weight:600;
  color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;
}
.form-group input{
  width:100%;padding:12px 16px;
  background:rgba(15,17,40,.8);
  border:1px solid rgba(0,212,255,.2);
  border-radius:8px;
  color:#e2e8f0;font-size:14px;
  transition:border-color .2s;
}
.form-group input:focus{
  outline:none;
  border-color:#00d4ff;
  box-shadow:0 0 10px rgba(0,212,255,.2);
}
.form-group input::placeholder{color:#4a5568}
.btn-login{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#0066cc,#00d4ff);
  border:none;border-radius:8px;
  color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;letter-spacing:1px;
  transition:transform .15s,box-shadow .15s;
}
.btn-login:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(0,212,255,.4);
}
.btn-login:active{transform:translateY(0)}
.erro{
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.3);
  border-radius:8px;
  padding:10px 14px;
  margin-bottom:16px;
  font-size:13px;
  color:#fca5a5;
  text-align:center;
}
.footer{
  text-align:center;margin-top:24px;
  font-size:11px;color:#4a5568;
}
.footer span{color:#00d4ff}
</style>
</head>
<body>
<div class="stars"></div>
<div class="login-container">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h1>MISSIONCONTROL</h1>
    <p>MONITORAMENTO ESPACIAL</p>
  </div>

  {% if erro %}
  <div class="erro">{{ erro }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="Digite seu usuario" autocomplete="off" autofocus>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="senha" placeholder="Digite sua senha">
    </div>
    <button type="submit" class="btn-login">ACESSAR SISTEMA</button>
  </form>

  <div class="footer">
    Global Solution 2026 &mdash; <span>FIAP</span>
  </div>
</div>
</body>
</html>
